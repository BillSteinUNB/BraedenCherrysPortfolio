<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Booking Confirmed — Cherry's Barbershop</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --cherry: #C41E3A;
      --cherry-bright: #E63950;
      --cherry-dark: #8B1528;
      --noir-rich: #0A0A0A;
      --noir-elevated: #141414;
      --noir-border: #222222;
      --text-gray: #A0A0A0;
      --ease-sharp: cubic-bezier(0.16, 1, 0.3, 1);
    }

    ::selection {
      background: var(--cherry);
      color: white;
    }

    body {
      background: var(--noir-rich);
      color: #fff;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* Grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9999;
      opacity: 0.03;
      mix-blend-mode: overlay;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    }

    /* Ambient glow */
    .glow {
      position: fixed;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(196, 30, 58, 0.08) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 560px;
      text-align: center;
    }

    /* Checkmark animation */
    .check-ring {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      border: 3px solid var(--cherry);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 2.5rem;
      opacity: 0;
      transform: scale(0.8);
      animation: ring-in 0.6s var(--ease-sharp) 0.2s forwards;
    }

    .check-ring svg {
      width: 40px;
      height: 40px;
      stroke: var(--cherry);
      stroke-width: 3;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
      stroke-dasharray: 50;
      stroke-dashoffset: 50;
      animation: draw-check 0.5s var(--ease-sharp) 0.6s forwards;
    }

    .heading {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2.5rem, 6vw, 4rem);
      line-height: 1;
      letter-spacing: -0.02em;
      margin-bottom: 1rem;
      opacity: 0;
      transform: translateY(20px);
      animation: fade-up 0.6s var(--ease-sharp) 0.4s forwards;
    }

    .heading span {
      color: var(--cherry);
    }

    .message {
      font-size: 1.125rem;
      line-height: 1.7;
      color: var(--text-gray);
      margin-bottom: 2.5rem;
      opacity: 0;
      transform: translateY(20px);
      animation: fade-up 0.6s var(--ease-sharp) 0.6s forwards;
    }

    .divider {
      width: 60px;
      height: 2px;
      background: var(--noir-border);
      margin: 0 auto 2.5rem;
      opacity: 0;
      animation: fade-up 0.6s var(--ease-sharp) 0.7s forwards;
    }

    .details {
      font-family: 'Space Mono', monospace;
      font-size: 0.8125rem;
      letter-spacing: 0.1em;
      color: rgba(255, 255, 255, 0.4);
      margin-bottom: 2.5rem;
      opacity: 0;
      transform: translateY(20px);
      animation: fade-up 0.6s var(--ease-sharp) 0.8s forwards;
    }

    .details a {
      color: rgba(255, 255, 255, 0.6);
      text-decoration: none;
      transition: color 0.2s ease;
    }

    .details a:hover {
      color: var(--cherry);
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--cherry);
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 0.875rem;
      padding: 1rem 2rem;
      border: none;
      border-radius: 2px;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s var(--ease-sharp);
      opacity: 0;
      transform: translateY(20px);
      animation: fade-up 0.6s var(--ease-sharp) 0.9s forwards;
    }

    .btn-primary:hover {
      background: var(--cherry-bright);
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(196, 30, 58, 0.3);
    }

    .footer-text {
      position: fixed;
      bottom: 2rem;
      left: 0;
      right: 0;
      text-align: center;
      font-family: 'Space Mono', monospace;
      font-size: 0.6875rem;
      color: rgba(255, 255, 255, 0.2);
      letter-spacing: 0.15em;
      z-index: 1;
    }

    @keyframes ring-in {
      to { opacity: 1; transform: scale(1); }
    }

    @keyframes draw-check {
      to { stroke-dashoffset: 0; }
    }

    @keyframes fade-up {
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="glow"></div>

  <div class="container">
    <div class="check-ring">
      <svg viewBox="0 0 24 24">
        <polyline points="4 12 10 18 20 6" />
      </svg>
    </div>

    <h1 class="heading">YOU'RE <span>BOOKED</span>.</h1>

    <p class="message">
      Your appointment at Cherry's Barbershop has been confirmed.
      Check your email for the details — we'll see you in the chair.
    </p>

    <div class="divider"></div>

    <p class="details">
      323 ST GEORGE ST, MONCTON NB
      <br />
      <a href="tel:6394142877">(639) 414-2877</a>
    </p>

    <a href="https://cherrysbarber.ca" class="btn-primary">
      BACK TO SITE
      <span>&rarr;</span>
    </a>
  </div>

  <div class="footer-text">
    CHERRY'S BARBERSHOP
  </div>
</body>
</html>
